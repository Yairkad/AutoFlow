<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a9e5c">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="אוטוליין">
  <link rel="manifest" href="manifest.json">
  <title>אוטוליין – תזכורות</title>
  <link rel="stylesheet" href="style.css?v=1.6">
  <style>
    @media print {
      .app-header, .main-nav, .action-area, #toast, .btn, button, .no-print { display:none !important; }
      body { background: white !important; }
      .card { box-shadow: none !important; }
    }

    /* Priority colors */
    .rem-item { display:flex; align-items:flex-start; gap:12px; padding:14px 0; border-bottom:1px solid var(--border); }
    .rem-item:last-child { border-bottom:none; }
    .rem-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; margin-top:4px; }
    .rem-dot.p-high   { background:var(--danger); }
    .rem-dot.p-med    { background:var(--warning); }
    .rem-dot.p-low    { background:var(--accent); }
    .rem-body { flex:1; min-width:0; }
    .rem-text { font-size:14px; font-weight:600; margin:0 0 4px; word-break:break-word; }
    .rem-text.done { text-decoration:line-through; color:var(--text-muted); }
    .rem-meta { font-size:12px; color:var(--text-muted); display:flex; gap:10px; flex-wrap:wrap; }
    .rem-due-soon { color:var(--warning); font-weight:700; }
    .rem-overdue  { color:var(--danger);  font-weight:700; }
    .rem-actions  { display:flex; gap:6px; flex-shrink:0; }

    .filter-tabs { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
    .filter-tab  { padding:6px 14px; border-radius:20px; border:1.5px solid var(--border); background:white; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; transition:all 0.15s; }
    .filter-tab.active { background:var(--primary); color:white; border-color:var(--primary); }

    .priority-badge { padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; }
    .priority-badge.p-high { background:#fee2e2; color:#dc2626; }
    .priority-badge.p-med  { background:#fef3c7; color:#d97706; }
    .priority-badge.p-low  { background:#dbeafe; color:#2563eb; }

    .done-badge { background:#dcfce7; color:#16a34a; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; }
  </style>
</head>
<body>

<header class="app-header">
  <div class="header-brand">
    <img class="header-logo" src="" alt="לוגו">
    <div class="header-title">
      <h1>אוטוליין</h1>
      <p>מערכת עזר לניהול</p>
    </div>
  </div>
</header>

<nav class="main-nav">
  <a href="index.html"          class="nav-link">🏠 <span class="label">ראשי</span></a>
  <a href="הוצאות.html"         class="nav-link">💰 <span class="label">הוצאות</span></a>
  <a href="חשבונות.html"        class="nav-link">🧾 <span class="label">חשבונות</span></a>
  <a href="מוצרים.html"         class="nav-link">📦 <span class="label">מלאי מוצרים</span></a>
  <a href="צמיגים.html"         class="nav-link">🔵 <span class="label">מלאי צמיגים</span></a>
  <a href="רכבים.html"          class="nav-link">🚗 <span class="label">מלאי רכבים</span></a>
  <a href="הצעות-מחיר.html"    class="nav-link">💬 <span class="label">הצעות מחיר</span></a>
  <a href="ספקים.html"          class="nav-link">🏭 <span class="label">ספקים</span></a>
  <a href="בדיקות-קניה.html"    class="nav-link">📝 <span class="label">בדיקות קניה</span></a>
  <a href="תזכורות.html"        class="nav-link">🔔 <span class="label">תזכורות</span></a>
  <a href="הגדרות.html"         class="nav-link">⚙️ <span class="label">הגדרות</span></a>
</nav>

<div class="container">
  <div class="page-title">
    <h2>🔔 תזכורות</h2>
    <div class="action-area">
      <button class="btn btn-primary" onclick="openAdd()">+ הוסף תזכורת</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row" id="statsRow"></div>

  <!-- Filter tabs -->
  <div class="filter-tabs">
    <button class="filter-tab active" onclick="setFilter('all',this)">הכל</button>
    <button class="filter-tab" onclick="setFilter('open',this)">פתוחות</button>
    <button class="filter-tab" onclick="setFilter('high',this)">🔴 דחוף</button>
    <button class="filter-tab" onclick="setFilter('done',this)">✅ הושלמו</button>
  </div>

  <!-- List -->
  <div class="card">
    <div class="card-header no-print">
      <div class="card-header-left">
        <div class="icon">🔔</div>
        <h3>רשימת תזכורות</h3>
      </div>
    </div>
    <div id="remList"></div>
    <div id="emptyState" class="empty-state" style="display:none">
      <div class="emoji">🔔</div>
      <p>אין תזכורות עדיין</p>
      <button class="btn btn-primary" onclick="openAdd()">הוסף תזכורת ראשונה</button>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div id="editModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">תזכורת חדשה</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="grid-inputs">
        <div class="field" style="grid-column:1/-1">
          <label>תיאור התזכורת *</label>
          <textarea id="f_text" rows="3" placeholder="לדוגמה: לחדש ביטוח, לשלם חשבון, לתאם פגישה..." oninput="markFilled(this)"></textarea>
        </div>
        <div class="field">
          <label>עדיפות</label>
          <select id="f_priority" oninput="markFilled(this)">
            <option value="med">בינונית</option>
            <option value="high">🔴 דחוף</option>
            <option value="low">🔵 נמוכה</option>
          </select>
        </div>
        <div class="field">
          <label>תאריך יעד (אופציונלי)</label>
          <input type="date" id="f_due" oninput="markFilled(this)">
        </div>
        <div class="field" style="grid-column:1/-1">
          <label>קטגוריה</label>
          <input type="text" id="f_cat" placeholder="לדוגמה: משרד, ביטוח, ספקים..." oninput="markFilled(this)">
        </div>
        <div class="field" style="grid-column:1/-1">
          <label>הערות נוספות</label>
          <textarea id="f_notes" rows="2" placeholder="פרטים נוספים..." oninput="markFilled(this)"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">ביטול</button>
      <button class="btn btn-primary" onclick="saveItem()">שמור</button>
    </div>
  </div>
</div>

<div id="confirmOverlay" class="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-icon">🗑️</div>
    <p id="confirmMsg"></p>
    <div class="confirm-btns">
      <button class="btn btn-secondary" onclick="confirmNo()">ביטול</button>
      <button class="btn btn-danger" onclick="confirmYes()">מחק</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="shared.js?v=1.6"></script>
<script>
const DB_KEY = 'pnc_reminders';

let _editId   = null;
let _filter   = 'all';

// ===== STATS =====
function loadStats() {
  const db = getDB(DB_KEY);
  const open     = db.filter(r => !r.done).length;
  const high     = db.filter(r => !r.done && r.priority === 'high').length;
  const overdue  = db.filter(r => !r.done && r.due && toDate(r.due) < new Date()).length;
  const done     = db.filter(r => r.done).length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-value">${open}</div><div class="stat-label">פתוחות</div></div>
    <div class="stat-card danger"><div class="stat-value">${high}</div><div class="stat-label">דחוף</div></div>
    <div class="stat-card warning"><div class="stat-value">${overdue}</div><div class="stat-label">באיחור</div></div>
    <div class="stat-card"><div class="stat-value">${done}</div><div class="stat-label">הושלמו</div></div>
  `;
}

function toDate(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  d.setHours(0,0,0,0);
  return d;
}

function dueMeta(due, done) {
  if (!due) return '';
  const d = toDate(due);
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((d - today) / 86400000);
  const label = d.toLocaleDateString('he-IL');
  if (done) return `<span>📅 ${label}</span>`;
  if (diff < 0) return `<span class="rem-overdue">⚠️ באיחור ${Math.abs(diff)} ימים (${label})</span>`;
  if (diff === 0) return `<span class="rem-due-soon">⏰ היום!</span>`;
  if (diff <= 3) return `<span class="rem-due-soon">📅 עוד ${diff} ימים (${label})</span>`;
  return `<span>📅 ${label}</span>`;
}

function priorityLabel(p) {
  if (p === 'high') return '<span class="priority-badge p-high">דחוף</span>';
  if (p === 'low')  return '<span class="priority-badge p-low">נמוכה</span>';
  return '<span class="priority-badge p-med">בינונית</span>';
}

// ===== RENDER =====
function setFilter(f, el) {
  _filter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  renderList();
}

function renderList() {
  let db = getDB(DB_KEY);

  // Sort: undone first, then by priority (high→med→low), then by due date
  const prioOrder = { high:0, med:1, low:2 };
  db.sort((a,b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    const pd = (prioOrder[a.priority]||1) - (prioOrder[b.priority]||1);
    if (pd !== 0) return pd;
    if (a.due && b.due) return a.due.localeCompare(b.due);
    if (a.due) return -1;
    if (b.due) return 1;
    return b.id - a.id;
  });

  if (_filter === 'open') db = db.filter(r => !r.done);
  if (_filter === 'high') db = db.filter(r => !r.done && r.priority === 'high');
  if (_filter === 'done') db = db.filter(r => r.done);

  const list = document.getElementById('remList');
  const empty = document.getElementById('emptyState');

  if (!db.length) {
    list.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  list.innerHTML = db.map(r => {
    const dotClass = r.done ? 'p-low' : (r.priority || 'med');
    return `<div class="rem-item">
      <div class="rem-dot ${dotClass}" style="${r.done?'opacity:0.4':''}"></div>
      <div class="rem-body">
        <div class="rem-text${r.done?' done':''}">${r.text}</div>
        <div class="rem-meta">
          ${priorityLabel(r.priority)}
          ${r.cat ? `<span>📂 ${r.cat}</span>` : ''}
          ${dueMeta(r.due, r.done)}
          ${r.done ? '<span class="done-badge">✅ הושלם</span>' : ''}
          ${r.notes ? `<span>📌 ${r.notes}</span>` : ''}
        </div>
      </div>
      <div class="rem-actions no-print">
        ${!r.done ? `<button class="btn-icon" title="סמן כהושלם" onclick="toggleDone(${r.id})">✅</button>` : `<button class="btn-icon" title="פתח מחדש" onclick="toggleDone(${r.id})">↩️</button>`}
        <button class="btn-icon" title="ערוך" onclick="openEdit(${r.id})">✏️</button>
        <button class="btn-icon" title="מחק" onclick="deleteItem(${r.id})">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

// ===== MODAL =====
function openAdd() {
  _editId = null;
  document.getElementById('modalTitle').textContent = 'תזכורת חדשה';
  ['f_text','f_notes','f_cat','f_due'].forEach(id => { document.getElementById(id).value = ''; });
  document.getElementById('f_priority').value = 'med';
  document.getElementById('editModal').classList.add('open');
  document.getElementById('f_text').focus();
}

function openEdit(id) {
  const r = getDB(DB_KEY).find(x => x.id === id);
  if (!r) return;
  _editId = id;
  document.getElementById('modalTitle').textContent = 'עריכת תזכורת';
  document.getElementById('f_text').value     = r.text     || '';
  document.getElementById('f_priority').value = r.priority || 'med';
  document.getElementById('f_due').value      = r.due      || '';
  document.getElementById('f_cat').value      = r.cat      || '';
  document.getElementById('f_notes').value    = r.notes    || '';
  document.getElementById('editModal').classList.add('open');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('open');
}

function saveItem() {
  const text = document.getElementById('f_text').value.trim();
  if (!text) { showToast('הכנס תיאור תזכורת', 'error'); return; }
  const db = getDB(DB_KEY);
  const item = {
    text,
    priority: document.getElementById('f_priority').value,
    due:      document.getElementById('f_due').value,
    cat:      document.getElementById('f_cat').value.trim(),
    notes:    document.getElementById('f_notes').value.trim(),
    done:     false
  };
  if (_editId) {
    const idx = db.findIndex(x => x.id === _editId);
    if (idx !== -1) { item.id = _editId; item.done = db[idx].done; db[idx] = item; }
  } else {
    item.id = nowId();
    db.push(item);
  }
  setDB(DB_KEY, db);
  closeModal();
  renderList();
  loadStats();
  showToast(_editId ? 'תזכורת עודכנה ✓' : 'תזכורת נוספה ✓', 'success');
  autoSync();
}

// ===== ACTIONS =====
function toggleDone(id) {
  const db = getDB(DB_KEY);
  const r = db.find(x => x.id === id);
  if (!r) return;
  r.done = !r.done;
  setDB(DB_KEY, db);
  renderList();
  loadStats();
  showToast(r.done ? 'סומן כהושלם ✓' : 'נפתח מחדש', 'success');
  autoSync();
}

function deleteItem(id) {
  showConfirm('למחוק את התזכורת?', () => {
    const db = getDB(DB_KEY).filter(x => x.id !== id);
    setDB(DB_KEY, db);
    renderList();
    loadStats();
    showToast('תזכורת נמחקה');
    autoSync();
  });
}

// ===== INIT =====
loadStats();
renderList();
</script>
</body>
</html>

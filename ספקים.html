<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>אוטוליין – ספקים</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .debt-positive { color:var(--danger); font-weight:700; }
    .debt-negative { color:var(--primary); font-weight:700; }
    .debt-zero     { color:var(--text-muted); }

    @media print {
      .app-header, .main-nav, .search-wrap,
      .action-area, .page-title, .stats-row, #confirmOverlay,
      #editModal, #toast, .btn, button, .btn-icon, .no-print { display:none !important; }
      body { background:white !important; }
      .card { box-shadow:none !important; margin:0 !important; }
      .print-doc-header { display:flex !important; }
      td:last-child, th:last-child { display:none; }
    }
    @media screen { .print-doc-header { display:none; } }
    .print-doc-header {
      justify-content:space-between; align-items:center;
      padding:10px 0 12px; margin-bottom:14px;
      border-bottom:3px solid #000;
    }
    .pdh-info h2 { font-size:20px; font-weight:900; margin:0 0 3px; }
    .pdh-info p  { font-size:12px; color:#555; margin:0; }
    .pdh-logo img { height:55px; object-fit:contain; }
  </style>
</head>
<body>

<header class="app-header">
  <div class="header-brand">
    <img class="header-logo" src="" alt="לוגו">
    <div class="header-title">
      <h1>אוטוליין</h1>
      <p>מערכת עזר לניהול</p>
    </div>
  </div>
</header>

<nav class="main-nav">
  <a href="index.html"          class="nav-link">🏠 <span class="label">ראשי</span></a>
  <a href="הוצאות.html"         class="nav-link">💰 <span class="label">הוצאות</span></a>
  <a href="מוצרים.html"         class="nav-link">📦 <span class="label">מלאי מוצרים</span></a>
  <a href="צמיגים.html"         class="nav-link">🔵 <span class="label">מלאי צמיגים</span></a>
  <a href="הצעות-מחיר.html"    class="nav-link">💬 <span class="label">הצעות מחיר</span></a>
  <a href="ספקים.html"          class="nav-link">🏭 <span class="label">ספקים</span></a>
  <a href="בדיקות-קניה.html"    class="nav-link">📝 <span class="label">בדיקות קניה</span></a>
  <a href="הגדרות.html"         class="nav-link">⚙️ <span class="label">הגדרות</span></a>
</nav>

<div class="container">
  <div class="page-title"><span class="icon">🏭</span> ספקים</div>

  <!-- Stats -->
  <div class="stats-row" id="statsRow"></div>

  <!-- Form -->
  <div class="card no-print">
    <div class="card-header">
      <div class="card-header-left">
        <div class="icon green">➕</div>
        <h3 id="formTitle">הוספת ספק</h3>
      </div>
    </div>
    <div class="card-body">
      <div class="grid-inputs">
        <div class="field">
          <label>שם חברה <span class="required-star">*</span></label>
          <input type="text" id="f_company" placeholder="שם הספק / חברה" oninput="markFilled(this)">
        </div>
        <div class="field">
          <label>קטגוריה / מוצרים</label>
          <input type="text" id="f_category" list="catList" placeholder="למשל: צמיגים, שמנים, חלקים..." oninput="markFilled(this)">
          <datalist id="catList"></datalist>
        </div>
        <div class="field">
          <label>שם איש קשר</label>
          <input type="text" id="f_contact" placeholder="שם נציג" oninput="markFilled(this)">
        </div>
        <div class="field">
          <label>טלפון</label>
          <input type="text" id="f_phone" placeholder="050-0000000" oninput="markFilled(this)">
        </div>
        <div class="field">
          <label>טלפון נוסף / פקס</label>
          <input type="text" id="f_phone2" placeholder="03-0000000" oninput="markFilled(this)">
        </div>
        <div class="field">
          <label>אימייל</label>
          <input type="text" id="f_email" placeholder="supplier@example.com" oninput="markFilled(this)">
        </div>
        <div class="field">
          <label>כתובת</label>
          <input type="text" id="f_address" placeholder="רחוב, עיר" oninput="markFilled(this)">
        </div>
        <div class="field">
          <label>חוב / זיכוי (₪) <small style="font-weight:400;color:var(--text-muted)">חיובי = אנחנו חייבים לספק</small></label>
          <input type="number" id="f_balance" placeholder="0.00" step="0.01" oninput="markFilled(this)">
        </div>
        <div class="field">
          <label>תנאי תשלום</label>
          <input type="text" id="f_terms" placeholder="למשל: שוטף+30" oninput="markFilled(this)">
        </div>
        <div class="field">
          <label>הערות</label>
          <input type="text" id="f_notes" placeholder="הערה חופשית" oninput="markFilled(this)">
        </div>
      </div>
    </div>
    <div class="action-area">
      <button class="btn btn-primary" onclick="saveSupplier()">💾 שמור ספק</button>
      <button class="btn btn-secondary" onclick="clearForm()">🗑 נקה</button>
    </div>
  </div>

  <!-- List -->
  <div class="card">
    <div class="print-doc-header" id="printDocHeader">
      <div class="pdh-info">
        <h2 id="pdh_title">רשימת ספקים</h2>
        <p id="pdh_sub"></p>
      </div>
      <div class="pdh-logo"><img id="pdh_logo" src="" style="display:none"></div>
    </div>
    <div class="card-header no-print">
      <div class="card-header-left">
        <div class="icon orange">🏭</div>
        <h3>רשימת ספקים</h3>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-warning btn-sm" onclick="printSuppliers()">🖨️ הדפס</button>
        <button class="btn btn-secondary btn-sm" onclick="exportSuppliers()">📊 ייצא Excel</button>
      </div>
    </div>
    <div class="search-wrap no-print">
      <input type="text" class="search-input" id="searchInput" placeholder="🔍  חיפוש לפי שם / קטגוריה / איש קשר..." oninput="renderTable()">
    </div>
    <div class="tbl-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>שם חברה</th>
            <th>קטגוריה</th>
            <th>איש קשר</th>
            <th>טלפון</th>
            <th>תנאי תשלום</th>
            <th>חוב / זיכוי</th>
            <th>הערות</th>
            <th class="no-print"></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div id="emptyState" class="empty-state" style="display:none">
      <div class="emoji">🏭</div>
      <p>אין ספקים רשומים עדיין</p>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div id="editModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3>עריכת ספק</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="grid-inputs">
        <div class="field"><label>שם חברה</label><input type="text" id="e_company" oninput="markFilled(this)"></div>
        <div class="field"><label>קטגוריה / מוצרים</label><input type="text" id="e_category" oninput="markFilled(this)"></div>
        <div class="field"><label>שם איש קשר</label><input type="text" id="e_contact" oninput="markFilled(this)"></div>
        <div class="field"><label>טלפון</label><input type="text" id="e_phone" oninput="markFilled(this)"></div>
        <div class="field"><label>טלפון נוסף</label><input type="text" id="e_phone2" oninput="markFilled(this)"></div>
        <div class="field"><label>אימייל</label><input type="text" id="e_email" oninput="markFilled(this)"></div>
        <div class="field"><label>כתובת</label><input type="text" id="e_address" oninput="markFilled(this)"></div>
        <div class="field"><label>חוב / זיכוי (₪)</label><input type="number" id="e_balance" step="0.01" oninput="markFilled(this)"></div>
        <div class="field"><label>תנאי תשלום</label><input type="text" id="e_terms" oninput="markFilled(this)"></div>
        <div class="field"><label>הערות</label><input type="text" id="e_notes" oninput="markFilled(this)"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">ביטול</button>
      <button class="btn btn-primary" style="flex:unset;padding:10px 24px" onclick="saveEdit()">💾 שמור</button>
    </div>
  </div>
</div>

<!-- Confirm -->
<div id="confirmOverlay" class="confirm-overlay">
  <div class="confirm-box">
    <div class="big-icon">🗑️</div>
    <h3>מחיקת ספק</h3>
    <p id="confirmMsg">האם למחוק את הספק?</p>
    <div class="btns">
      <button class="btn btn-secondary" onclick="confirmNo()">ביטול</button>
      <button class="btn btn-danger" onclick="confirmYes()">מחק</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="shared.js"></script>
<script>
const DB_KEY = 'pnc_suppliers';
let editId = null;

document.addEventListener('DOMContentLoaded', () => {
  buildCatList();
  renderStats();
  renderTable();
});

function buildCatList() {
  const db   = getDB(DB_KEY);
  const cats = [...new Set(db.map(s=>s.category).filter(Boolean))].sort();
  document.getElementById('catList').innerHTML = cats.map(c=>`<option value="${c}">`).join('');
}

// ===== SAVE =====
function saveSupplier() {
  const company = document.getElementById('f_company').value.trim();
  if (!company) return showToast('יש להזין שם חברה', 'error');
  const record = {
    id:       nowId(),
    company,
    category: document.getElementById('f_category').value.trim(),
    contact:  document.getElementById('f_contact').value.trim(),
    phone:    document.getElementById('f_phone').value.trim(),
    phone2:   document.getElementById('f_phone2').value.trim(),
    email:    document.getElementById('f_email').value.trim(),
    address:  document.getElementById('f_address').value.trim(),
    balance:  parseFloat(document.getElementById('f_balance').value)||0,
    terms:    document.getElementById('f_terms').value.trim(),
    notes:    document.getElementById('f_notes').value.trim()
  };
  const db = getDB(DB_KEY);
  db.unshift(record);
  setDB(DB_KEY, db);
  clearForm();
  buildCatList();
  renderStats();
  renderTable();
  showToast('הספק נשמר ✓', 'success');
}

function clearForm() {
  ['f_company','f_category','f_contact','f_phone','f_phone2','f_email','f_address','f_balance','f_terms','f_notes']
    .forEach(id => { const el=document.getElementById(id); el.value=''; el.classList.remove('filled'); });
}

// ===== STATS =====
function renderStats() {
  const db = getDB(DB_KEY);
  const totalDebt   = db.filter(s=>s.balance>0).reduce((s,x)=>s+x.balance, 0);
  const totalCredit = db.filter(s=>s.balance<0).reduce((s,x)=>s+Math.abs(x.balance), 0);
  const withDebt    = db.filter(s=>s.balance>0).length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><span class="num">${db.length}</span><div class="lbl">סה"כ ספקים</div></div>
    <div class="stat-card red"><span class="num">₪${totalDebt.toLocaleString('he-IL',{maximumFractionDigits:0})}</span><div class="lbl">סה"כ חוב לספקים</div></div>
    <div class="stat-card"><span class="num">₪${totalCredit.toLocaleString('he-IL',{maximumFractionDigits:0})}</span><div class="lbl">סה"כ זיכוי מספקים</div></div>
    <div class="stat-card orange"><span class="num">${withDebt}</span><div class="lbl">ספקים עם חוב</div></div>
  `;
}

// ===== RENDER TABLE =====
function renderTable() {
  const db     = getDB(DB_KEY);
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filtered = db.filter(s => {
    if (!search) return true;
    const hay = [s.company,s.category,s.contact,s.phone,s.notes].join(' ').toLowerCase();
    return hay.includes(search);
  });
  const body  = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');
  if (!filtered.length) { body.innerHTML=''; empty.style.display=''; return; }
  empty.style.display = 'none';
  body.innerHTML = filtered.map(s => {
    const bal = parseFloat(s.balance)||0;
    const balHtml = bal > 0
      ? `<span class="debt-positive">חוב: ₪${bal.toLocaleString('he-IL',{minimumFractionDigits:2})}</span>`
      : bal < 0
        ? `<span class="debt-negative">זיכוי: ₪${Math.abs(bal).toLocaleString('he-IL',{minimumFractionDigits:2})}</span>`
        : `<span class="debt-zero">—</span>`;
    return `<tr>
      <td style="font-weight:700">${s.company}</td>
      <td>${s.category||'—'}</td>
      <td>${s.contact||'—'}</td>
      <td>${s.phone||'—'}${s.phone2?`<br><small style="color:var(--text-muted)">${s.phone2}</small>`:''}</td>
      <td>${s.terms||'—'}</td>
      <td>${balHtml}</td>
      <td style="font-size:12px;color:var(--text-muted)">${s.notes||'—'}</td>
      <td class="no-print" style="white-space:nowrap">
        <button class="btn-icon" title="ערוך"  onclick="openEdit(${s.id})">✏️</button>
        <button class="btn-icon" title="מחק"   onclick="deleteSupplier(${s.id})">🗑️</button>
      </td>
    </tr>`;
  }).join('');
}

// ===== EDIT =====
function openEdit(id) {
  const s = getDB(DB_KEY).find(x=>x.id===id); if(!s) return;
  editId = id;
  document.getElementById('e_company').value  = s.company  || '';
  document.getElementById('e_category').value = s.category || '';
  document.getElementById('e_contact').value  = s.contact  || '';
  document.getElementById('e_phone').value    = s.phone    || '';
  document.getElementById('e_phone2').value   = s.phone2   || '';
  document.getElementById('e_email').value    = s.email    || '';
  document.getElementById('e_address').value  = s.address  || '';
  document.getElementById('e_balance').value  = s.balance  || '';
  document.getElementById('e_terms').value    = s.terms    || '';
  document.getElementById('e_notes').value    = s.notes    || '';
  document.getElementById('editModal').classList.add('open');
}
function closeModal() { document.getElementById('editModal').classList.remove('open'); editId=null; }
function saveEdit() {
  if (!editId) return;
  const db=getDB(DB_KEY), idx=db.findIndex(x=>x.id===editId);
  if (idx===-1) return;
  db[idx] = { ...db[idx],
    company:  document.getElementById('e_company').value.trim(),
    category: document.getElementById('e_category').value.trim(),
    contact:  document.getElementById('e_contact').value.trim(),
    phone:    document.getElementById('e_phone').value.trim(),
    phone2:   document.getElementById('e_phone2').value.trim(),
    email:    document.getElementById('e_email').value.trim(),
    address:  document.getElementById('e_address').value.trim(),
    balance:  parseFloat(document.getElementById('e_balance').value)||0,
    terms:    document.getElementById('e_terms').value.trim(),
    notes:    document.getElementById('e_notes').value.trim()
  };
  setDB(DB_KEY,db); closeModal(); buildCatList(); renderStats(); renderTable();
  showToast('הספק עודכן ✓','success');
}

// ===== DELETE =====
function deleteSupplier(id) {
  const s = getDB(DB_KEY).find(x=>x.id===id);
  showConfirm(`למחוק את "${s?.company||'הספק'}"?`, () => {
    setDB(DB_KEY, getDB(DB_KEY).filter(x=>x.id!==id));
    buildCatList(); renderStats(); renderTable();
    showToast('נמחק ✓');
  });
}

// ===== PRINT =====
function printSuppliers() {
  const s = getSettings();
  document.getElementById('pdh_title').textContent = 'רשימת ספקים';
  document.getElementById('pdh_sub').textContent   = [s.businessName, s.businessPhone].filter(Boolean).join(' | ') + '  |  ' + todayStr();
  const logo = document.getElementById('pdh_logo');
  if (s.logoBase64) { logo.src=s.logoBase64; logo.style.display=''; } else { logo.style.display='none'; }
  window.print();
}

// ===== EXPORT =====
function exportSuppliers() {
  const db = getDB(DB_KEY); if(!db.length) return showToast('אין נתונים','error');
  const hdrs = ['שם חברה','קטגוריה','איש קשר','טלפון','טלפון נוסף','אימייל','כתובת','חוב/זיכוי','תנאי תשלום','הערות'];
  const rows = db.map(s=>[s.company,s.category,s.contact,s.phone,s.phone2,s.email,s.address,s.balance,s.terms,s.notes]);
  exportToExcel([hdrs,...rows],'ספקים-אוטוליין','ספקים');
}
</script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</body>
</html>

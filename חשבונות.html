<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a9e5c">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="אוטוליין">
  <link rel="icon" href="icon-512.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <title>אוטוליין – חשבונות</title>
  <link rel="stylesheet" href="style.css?v=1.7">
  <style>
    @media print {
      .app-header, .main-nav, .action-area, #toast, .btn, button, .no-print,
      #editModal, #confirmOverlay { display:none !important; }
      body { background:white !important; }
      .card { box-shadow:none !important; }
      .print-doc-header { display:flex !important; }
    }
    @media screen { .print-doc-header { display:none; } }
    .print-doc-header {
      justify-content:space-between; align-items:center;
      padding:10px 0 12px; margin-bottom:14px; border-bottom:3px solid #000;
    }
    .pdh-info h2 { font-size:20px; font-weight:900; margin:0 0 3px; }
    .pdh-info p  { font-size:12px; color:#555; margin:0; }
    .pdh-logo img { height:55px; object-fit:contain; }

    .tenant-card {
      border:2px solid var(--border); border-radius:var(--radius);
      padding:16px; margin-bottom:14px; background:white;
    }
    .tenant-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px; }
    .tenant-name { font-size:16px; font-weight:900; }
    .tenant-phone { font-size:13px; color:var(--text-muted); }

    .items-table { width:100%; border-collapse:collapse; margin-bottom:10px; }
    .items-table th { font-size:12px; color:var(--text-muted); font-weight:600; padding:4px 8px; border-bottom:1px solid var(--border); text-align:right; }
    .items-table td { padding:7px 8px; font-size:13px; border-bottom:1px solid var(--border); vertical-align:middle; }
    .items-table tr:last-child td { border-bottom:none; }
    .items-table .amount-cell { font-weight:700; color:var(--primary); }

    .tenant-total { text-align:left; font-size:15px; font-weight:900; padding:6px 8px; border-top:2px solid var(--border); }

    .bill-period-bar {
      display:flex; gap:8px; align-items:center; margin-bottom:16px; flex-wrap:wrap;
    }

    .payment-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:8px 12px; border-radius:8px; margin-top:8px; flex-wrap:wrap; gap:8px;
    }
    .payment-row.paid   { background:#dcfce7; }
    .payment-row.unpaid { background:#fff7ed; }
    .paid-badge   { background:#16a34a; color:white; padding:2px 10px; border-radius:10px; font-size:11px; font-weight:700; }
    .unpaid-badge { background:#d97706; color:white; padding:2px 10px; border-radius:10px; font-size:11px; font-weight:700; }

    .paid-date-input {
      border:none; background:rgba(0,0,0,.06); border-radius:6px;
      padding:3px 8px; font-family:inherit; font-size:12px; color:var(--text);
      width:110px; text-align:center;
    }
    .paid-date-input:focus { outline:2px solid #16a34a; }

    /* Variable item input inside table */
    .var-amount-input {
      width:100px; padding:4px 8px; border:1.5px solid var(--border);
      border-radius:6px; font-family:inherit; font-size:13px; font-weight:700;
      color:var(--primary); background:#fffbf0;
    }
    .var-amount-input:focus { outline:none; border-color:var(--warning); }
    .badge-variable {
      display:inline-block; font-size:10px; background:#fef9c3;
      color:#92400e; padding:1px 6px; border-radius:6px; font-weight:700;
      margin-right:5px; vertical-align:middle;
    }

    /* Item row in modal */
    .item-row { background:#f8fafc; border-radius:10px; padding:10px; margin-bottom:8px; }
    .item-row-top { display:grid; grid-template-columns:2fr 1fr 1fr 32px; gap:6px; align-items:end; }
    .item-row-bottom { display:flex; align-items:center; gap:8px; margin-top:6px; }
    .item-row label { font-size:11px; color:var(--text-muted); display:block; margin-bottom:2px; }
    .item-row input {
      padding:7px 8px; border:1px solid var(--border); border-radius:8px;
      font-family:inherit; font-size:13px; width:100%; box-sizing:border-box;
    }
    .item-row input:focus { outline:none; border-color:var(--primary); }
    .type-toggle {
      padding:4px 10px; border-radius:16px; border:1.5px solid;
      cursor:pointer; font-family:inherit; font-size:11px; font-weight:700;
      white-space:nowrap; transition:all .15s;
    }
    .type-toggle.fixed    { background:#e0f2fe; color:#0369a1; border-color:#bae6fd; }
    .type-toggle.variable { background:#fef9c3; color:#92400e; border-color:#fde68a; }
    .vat-hint { font-size:11px; color:var(--text-muted); }

    /* Electricity type */
    .type-toggle.electricity { background:#fef3c7; color:#92400e; border-color:#fde68a; }
    .badge-electricity {
      display:inline-block; font-size:10px; background:#fef3c7;
      color:#92400e; padding:1px 6px; border-radius:6px; font-weight:700;
      margin-left:4px; vertical-align:middle;
    }
    .elec-meter-row {
      display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin-bottom:4px;
    }
    .elec-input {
      width:90px; padding:4px 8px; border:1.5px solid var(--border);
      border-radius:6px; font-family:inherit; font-size:13px;
      color:var(--text); background:#fffbf0;
    }
    .elec-input:focus { outline:none; border-color:#f59e0b; }
    .elec-badge {
      background:#fef3c7; color:#92400e; padding:3px 10px;
      border-radius:8px; font-size:12px; font-weight:700; white-space:nowrap;
    }
    .elec-amount-badge {
      background:#dcfce7; color:#166534; padding:3px 12px;
      border-radius:8px; font-size:13px; font-weight:900; white-space:nowrap;
    }
  </style>
</head>

<script src="shared.js?v=1.7"></script>
<script>
const DB_TENANTS  = 'pnc_tenants';
const DB_PAYMENTS = 'pnc_payments';
const VAT_RATE = 1.17;

let _editTenantId = null;
let _itemSeq = 0;

// ===== PERIOD HELPERS =====
function _monthsBack(n) {
  const d = new Date();
  d.setMonth(d.getMonth() - n);
  return String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear();
}
function _periodLabel(p) {
  const [mm,yy] = p.split('/');
  const names = ['','ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  return (names[parseInt(mm)]||mm) + ' ' + yy;
}
function buildPeriodList() {
  const sel = document.getElementById('periodSel');
  const cur = sel.value || _monthsBack(0);
  const opts = Array.from({length:13},(_,i)=>_monthsBack(i));
  sel.innerHTML = opts.map(p=>`<option value="${p}" ${p===cur?'selected':''}>${_periodLabel(p)}</option>`).join('');
}

// ===== TOTAL CALCULATION =====
// Handles fixed items (always same amount) and variable items (amount from payment record)
function totalForTenant(t, pmt) {
  return (t.items||[]).reduce((s, item) => {
    if (item.type === 'variable' || item.type === 'electricity') {
      const varAmounts = pmt && pmt.varAmounts ? pmt.varAmounts : {};
      return s + (parseFloat(varAmounts[item.id]) || 0);
    }
    return s + (parseFloat(item.amount) || 0);
  }, 0);
}

// ===== STATS =====
function renderStats() {
  const tenants  = getDB(DB_TENANTS);
  const payments = getDB(DB_PAYMENTS);
  const period   = document.getElementById('periodSel').value || _monthsBack(0);
  const periodPmts = payments.filter(p => p.period === period);
  const totalOwed = tenants.reduce((s,t) => {
    const pmt = periodPmts.find(p => p.tenantId === t.id);
    return s + totalForTenant(t, pmt);
  }, 0);
  const totalPaid = periodPmts.reduce((s,p) => s + (p.paid ? (parseFloat(p.amount)||0) : 0), 0);
  const unpaidCount = tenants.filter(t => {
    const pmt = periodPmts.find(p => p.tenantId === t.id);
    return !pmt || !pmt.paid;
  }).length;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-value">${tenants.length}</div><div class="stat-label">שוכרים</div></div>
    <div class="stat-card blue"><div class="stat-value">₪${totalOwed.toLocaleString('he-IL',{maximumFractionDigits:0})}</div><div class="stat-label">סה"כ לגבייה</div></div>
    <div class="stat-card"><div class="stat-value">₪${totalPaid.toLocaleString('he-IL',{maximumFractionDigits:0})}</div><div class="stat-label">שולם</div></div>
    <div class="stat-card ${unpaidCount>0?'danger':''}"><div class="stat-value">${unpaidCount}</div><div class="stat-label">ממתינים</div></div>
  `;
}

// ===== RENDER BILLS =====
function renderBills() {
  const tenants  = getDB(DB_TENANTS);
  const payments = getDB(DB_PAYMENTS);
  const period   = document.getElementById('periodSel').value || _monthsBack(0);
  const area     = document.getElementById('billsArea');
  const empty    = document.getElementById('emptyState');

  renderStats();

  if (!tenants.length) { area.innerHTML=''; empty.style.display=''; return; }
  empty.style.display = 'none';

  area.innerHTML = tenants.map(t => {
    const pmt  = payments.find(p => p.tenantId === t.id && p.period === period);
    const paid = pmt && pmt.paid;
    const varAmounts = pmt && pmt.varAmounts ? pmt.varAmounts : {};
    const total = totalForTenant(t, pmt);
    const items = t.items || [];

    const elecReadings = pmt && pmt.elecReadings ? pmt.elecReadings : {};

    const itemRows = items.map(item => {
      if (item.type === 'electricity') {
        const er     = elecReadings[item.id] || {};
        const prev   = er.prev != null ? er.prev : '';
        const curr   = er.curr != null ? er.curr : '';
        const kwh    = er.kwh  || 0;
        // Monthly price: use saved value for this period, fall back to tenant default
        const pkwh   = er.pkwh != null ? er.pkwh : (item.pricePerKwh || 0);
        const amt    = Math.round(kwh * pkwh * 100) / 100;
        return `
          <tr>
            <td>
              <span class="badge-electricity">⚡</span>${item.label||'חשמל'}
            </td>
            <td colspan="2">
              <div class="elec-meter-row no-print">
                <div style="display:flex;flex-direction:column;align-items:center">
                  <small style="color:var(--text-muted);font-size:10px;margin-bottom:2px">₪ לקוטש</small>
                  <input class="elec-input" type="number" value="${pkwh||''}" placeholder="0.000"
                    id="epkwh_${t.id}_${item.id}" style="width:75px;border-color:#a78bfa;background:#f5f3ff"
                    oninput="calcElecFromKwh(${t.id},'${period}',${item.id})">
                </div>
                <span style="font-size:14px;color:var(--text-muted)">×</span>
                <div style="display:flex;flex-direction:column;align-items:center">
                  <small style="color:var(--text-muted);font-size:10px;margin-bottom:2px">מונה קודם</small>
                  <input class="elec-input" type="number" value="${prev}" placeholder="0"
                    id="eprev_${t.id}_${item.id}"
                    oninput="calcElecFromMeter(${t.id},'${period}',${item.id})">
                </div>
                <span style="font-size:18px;color:var(--text-muted)">→</span>
                <div style="display:flex;flex-direction:column;align-items:center">
                  <small style="color:var(--text-muted);font-size:10px;margin-bottom:2px">מונה נוכחי</small>
                  <input class="elec-input" type="number" value="${curr}" placeholder="0"
                    id="ecurr_${t.id}_${item.id}"
                    oninput="calcElecFromMeter(${t.id},'${period}',${item.id})">
                </div>
                <span id="ekwh_${t.id}_${item.id}" class="elec-badge">${kwh > 0 ? kwh + ' קוטש' : '— קוטש'}</span>
                <span id="eamt_${t.id}_${item.id}" class="elec-amount-badge">${amt > 0 ? '₪' + amt.toFixed(2) : '—'}</span>
              </div>
              <div style="margin-top:5px;display:flex;align-items:center;gap:6px" class="no-print">
                <small style="color:var(--text-muted)">או הזן כמות ישירות:</small>
                <input class="elec-input" type="number" value="${kwh||''}" placeholder="קוטש"
                  id="ekwh_inp_${t.id}_${item.id}" style="width:80px"
                  oninput="calcElecFromKwh(${t.id},'${period}',${item.id})">
                <small style="color:var(--text-muted)">קוטש</small>
              </div>
              <div class="print-only" style="font-size:13px;font-weight:700">
                ${kwh > 0 ? kwh + ' קוטש × ₪' + pkwh + ' = ₪' + amt.toFixed(2) : '—'}
              </div>
            </td>
          </tr>`;
      } else if (item.type === 'variable') {
        const va = parseFloat(varAmounts[item.id]) || 0;
        const bv = va > 0 ? (va / VAT_RATE).toFixed(2) : '';
        return `
          <tr>
            <td><span class="badge-variable">משתנה</span>${item.label||'—'}</td>
            <td class="amount-cell">
              <input class="var-amount-input no-print" type="number" value="${va||''}" placeholder="₪"
                onchange="saveVarAmt(${t.id},'${period}',${item.id},this.value)"
                oninput="updateTotalDisplay(this,'${t.id}')">
              <span class="print-only">${va?'₪'+va.toLocaleString('he-IL',{minimumFractionDigits:2}):''}</span>
            </td>
            <td style="font-size:11px;color:var(--text-muted)">${bv?'לפני מע"מ: ₪'+bv:item.notes||''}</td>
          </tr>`;
      } else {
        const bv = item.beforeVat ? parseFloat(item.beforeVat).toLocaleString('he-IL',{minimumFractionDigits:2}) : '';
        return `
          <tr>
            <td>${item.label||'—'}</td>
            <td class="amount-cell">₪${(parseFloat(item.amount)||0).toLocaleString('he-IL',{minimumFractionDigits:2})}</td>
            <td style="font-size:11px;color:var(--text-muted)">${bv?'לפני מע"מ: ₪'+bv:item.notes||''}</td>
          </tr>`;
      }
    }).join('');

    const paidDateVal = pmt && pmt.paidDate ? pmt.paidDate : '';
    const payNotesVal = pmt && pmt.payNotes ? pmt.payNotes : '';

    return `<div class="tenant-card" id="tc_${t.id}">
      <div class="tenant-header">
        <div>
          <div class="tenant-name">${t.name}</div>
          ${t.phone?`<div class="tenant-phone">📞 ${t.phone}</div>`:''}
          ${t.notes?`<div class="tenant-phone">${t.notes}</div>`:''}
        </div>
        <div style="display:flex;gap:8px" class="no-print">
          <button class="btn btn-secondary btn-sm" onclick="openEditTenant(${t.id})">✏️ ערוך</button>
          <button class="btn btn-danger btn-sm" onclick="deleteTenant(${t.id})">🗑️ מחק</button>
        </div>
      </div>

      <div class="print-doc-header" style="display:none;margin-bottom:10px">
        <div class="pdh-info">
          <h2>${t.name}</h2>
          <p>חשבון לתקופה: ${_periodLabel(period)} | ${todayStr()}</p>
        </div>
      </div>

      <table class="items-table">
        <thead><tr><th>פריט</th><th>סכום</th><th>לפני מע"מ / הערה</th></tr></thead>
        <tbody>${itemRows}</tbody>
        <tfoot><tr><td colspan="3">
          <div class="tenant-total" id="total_${t.id}">סה"כ לתשלום: ₪${total.toLocaleString('he-IL',{minimumFractionDigits:2})}</div>
        </td></tr></tfoot>
      </table>

      <div class="payment-row ${paid?'paid':'unpaid'}">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <span class="${paid?'paid-badge':'unpaid-badge'}">${paid?'✅ שולם':'⏳ ממתין'}</span>
          ${paid?`
            <span style="font-size:12px;color:var(--text-muted)">תאריך:</span>
            <input class="paid-date-input no-print" type="text" value="${paidDateVal}"
              placeholder="DD/MM/YYYY"
              onchange="updatePaidDate(${t.id},'${period}',this.value)"
              onblur="this.value=normDate(this.value)"
              title="תאריך קבלת התשלום">
            <span class="print-only" style="font-size:12px;color:var(--text-muted)">${paidDateVal}</span>
          `:`<span style="font-size:12px;color:var(--text-muted)">${_periodLabel(period)}</span>`}
          ${payNotesVal?`<span style="font-size:12px;color:var(--text-muted)"> | ${payNotesVal}</span>`:''}
        </div>
        <div class="no-print">
          ${paid
            ? `<button class="btn btn-secondary btn-sm" onclick="markPayment(${t.id},'${period}',false)">↩️ בטל תשלום</button>`
            : `<button class="btn btn-primary btn-sm" onclick="markPayment(${t.id},'${period}',true)">✅ סמן כשולם</button>`
          }
        </div>
      </div>
    </div>`;
  }).join('');
}

// ===== UPDATE TOTAL DISPLAY (for variable inputs without saving) =====
function updateTotalDisplay(input, tenantId) {
  const t = getDB(DB_TENANTS).find(x => x.id == tenantId);
  if (!t) return;
  const pmt = getDB(DB_PAYMENTS).find(p => p.tenantId == tenantId && p.period === (document.getElementById('periodSel').value || _monthsBack(0)));
  // Build virtual varAmounts from current inputs
  const varInputs = input.closest('.tenant-card').querySelectorAll('.var-amount-input');
  const varAmounts = pmt && pmt.varAmounts ? {...pmt.varAmounts} : {};
  varInputs.forEach(inp => {
    const onchangeAttr = inp.getAttribute('onchange') || '';
    const match = onchangeAttr.match(/saveVarAmt\([\d]+,'[^']+',(\d+)/);
    if (match) varAmounts[parseInt(match[1])] = parseFloat(inp.value) || 0;
  });
  const virtualPmt = { ...(pmt||{}), varAmounts };
  const total = totalForTenant(t, virtualPmt);
  const el = document.getElementById('total_' + tenantId);
  if (el) el.textContent = 'סה"כ לתשלום: ₪' + total.toLocaleString('he-IL',{minimumFractionDigits:2});
}

// ===== ELECTRICITY CALCULATIONS =====
function _getElecInputs(tId, itemId) {
  const prevEl  = document.getElementById('eprev_'    + tId + '_' + itemId);
  const currEl  = document.getElementById('ecurr_'    + tId + '_' + itemId);
  const pkwhEl  = document.getElementById('epkwh_'    + tId + '_' + itemId);
  const kwhInp  = document.getElementById('ekwh_inp_' + tId + '_' + itemId);
  return {
    prev:  parseFloat(prevEl  ? prevEl.value  : 0) || 0,
    curr:  parseFloat(currEl  ? currEl.value  : 0) || 0,
    pkwh:  parseFloat(pkwhEl  ? pkwhEl.value  : 0) || 0,
    kwhInp
  };
}

function calcElecFromMeter(tId, period, itemId) {
  const { prev, curr, pkwh, kwhInp } = _getElecInputs(tId, itemId);
  const kwh = curr > prev ? Math.round((curr - prev) * 1000) / 1000 : 0;
  const amt = Math.round(kwh * pkwh * 100) / 100;
  _updateElecDisplay(tId, itemId, kwh, amt);
  if (kwhInp) kwhInp.value = kwh > 0 ? kwh : '';
  _saveElecData(tId, period, itemId, prev, curr, kwh, amt, pkwh);
}

function calcElecFromKwh(tId, period, itemId) {
  const { prev, curr, pkwh, kwhInp } = _getElecInputs(tId, itemId);
  const kwh = parseFloat(kwhInp ? kwhInp.value : 0) || 0;
  const amt = Math.round(kwh * pkwh * 100) / 100;
  _updateElecDisplay(tId, itemId, kwh, amt);
  _saveElecData(tId, period, itemId, prev, curr, kwh, amt, pkwh);
}

function _updateElecDisplay(tId, itemId, kwh, amt) {
  const kwhEl = document.getElementById('ekwh_' + tId + '_' + itemId);
  const amtEl = document.getElementById('eamt_' + tId + '_' + itemId);
  if (kwhEl) kwhEl.textContent = kwh > 0 ? kwh + ' קוטש' : '— קוטש';
  if (amtEl) amtEl.textContent = amt > 0 ? '₪' + amt.toFixed(2) : '—';
}

function _saveElecData(tId, period, itemId, prev, curr, kwh, amount, pkwh) {
  const db  = getDB(DB_PAYMENTS);
  let   idx = db.findIndex(p => p.tenantId === tId && p.period === period);
  if (idx === -1) {
    db.push({ tenantId: tId, period, paid: false, amount: 0, paidDate: '', payNotes: '', varAmounts: {}, elecReadings: {} });
    idx = db.length - 1;
  }
  if (!db[idx].varAmounts)   db[idx].varAmounts   = {};
  if (!db[idx].elecReadings) db[idx].elecReadings = {};
  db[idx].varAmounts[itemId]   = amount;
  db[idx].elecReadings[itemId] = { prev, curr, kwh, pkwh };
  const tenant = getDB(DB_TENANTS).find(t => t.id === tId);
  if (tenant) db[idx].amount = totalForTenant(tenant, db[idx]);
  setDB(DB_PAYMENTS, db);
  // Update total display
  const totalEl = document.getElementById('total_' + tId);
  if (totalEl && tenant) {
    const total = totalForTenant(tenant, db[idx]);
    totalEl.textContent = 'סה"כ לתשלום: ₪' + total.toLocaleString('he-IL', { minimumFractionDigits: 2 });
  }
  renderStats();
  autoSync();
}

// ===== SAVE VARIABLE AMOUNT =====
function saveVarAmt(tenantId, period, itemId, value) {
  const db = getDB(DB_PAYMENTS);
  let idx = db.findIndex(p => p.tenantId === tenantId && p.period === period);
  if (idx === -1) {
    db.push({ tenantId, period, paid: false, amount: 0, paidDate: '', payNotes: '', varAmounts: {} });
    idx = db.length - 1;
  }
  if (!db[idx].varAmounts) db[idx].varAmounts = {};
  db[idx].varAmounts[itemId] = parseFloat(value) || 0;
  const tenant = getDB(DB_TENANTS).find(t => t.id === tenantId);
  db[idx].amount = tenant ? totalForTenant(tenant, db[idx]) : 0;
  setDB(DB_PAYMENTS, db);
  renderStats();
  autoSync();
}

// ===== UPDATE PAID DATE =====
function updatePaidDate(tenantId, period, date) {
  const db  = getDB(DB_PAYMENTS);
  const idx = db.findIndex(p => p.tenantId === tenantId && p.period === period);
  if (idx !== -1) {
    db[idx].paidDate = date;
    setDB(DB_PAYMENTS, db);
    autoSync();
  }
}

// ===== PAYMENT =====
function markPayment(tenantId, period, paid) {
  const db     = getDB(DB_PAYMENTS);
  let   idx    = db.findIndex(p => p.tenantId === tenantId && p.period === period);
  const tenant = getDB(DB_TENANTS).find(t => t.id === tenantId);
  const existing = idx !== -1 ? db[idx] : {};
  const amount = tenant ? totalForTenant(tenant, existing) : 0;
  const entry  = {
    ...existing,
    tenantId, period, paid, amount,
    paidDate:  paid ? (existing.paidDate || todayStr()) : '',
    payNotes:  existing.payNotes || ''
  };
  if (idx !== -1) db[idx] = entry; else db.push(entry);
  setDB(DB_PAYMENTS, db);
  renderBills();
  showToast(paid ? 'סומן כשולם ✓' : 'תשלום בוטל', paid ? 'success' : '');
  autoSync();
}

// ===== TENANT MODAL =====
function openAddTenant() {
  _editTenantId = null;
  document.getElementById('modalTitle').textContent = 'שוכר חדש';
  ['t_name','t_phone','t_notes'].forEach(id => { document.getElementById(id).value=''; });
  document.getElementById('itemsWrap').innerHTML = '';
  _itemSeq = 0;
  addItemRow();
  document.getElementById('editModal').classList.add('open');
}

function openEditTenant(id) {
  const t = getDB(DB_TENANTS).find(x => x.id === id);
  if (!t) return;
  _editTenantId = id;
  document.getElementById('modalTitle').textContent = 'עריכת שוכר';
  document.getElementById('t_name').value  = t.name  || '';
  document.getElementById('t_phone').value = t.phone || '';
  document.getElementById('t_notes').value = t.notes || '';
  const wrap = document.getElementById('itemsWrap');
  wrap.innerHTML = '';
  _itemSeq = 0;
  (t.items||[]).forEach(item => addItemRow(item));
  document.getElementById('editModal').classList.add('open');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('open');
}

// ===== ADD ITEM ROW =====
function addItemRow(item) {
  const seq   = ++_itemSeq;
  const wrap  = document.getElementById('itemsWrap');
  const div   = document.createElement('div');
  const type  = item ? (item.type || 'fixed') : 'fixed';
  const label = item ? (item.label||'') : '';
  const amt   = item ? (item.amount||'') : '';
  const bv    = item ? (item.beforeVat||'') : '';
  const notes = item ? (item.notes||'') : '';
  const pkwh  = item ? (item.pricePerKwh||'') : '';
  const isElec = type === 'electricity';
  const typeLabels = { fixed:'📌 קבוע', variable:'📊 משתנה', electricity:'⚡ חשמל' };
  const hintText = isElec
    ? '⚡ הסכום יחושב לפי קריאת מונה בכל חודש'
    : (bv ? `לפני מע"מ: ₪${bv}` : 'מלא כולל מע"מ ← יחושב לפני אוטומטית');

  div.id = 'item_' + seq;
  div.className = 'item-row';
  div.innerHTML = `
    <div class="item-row-top">
      <div>
        <label>שם הפריט</label>
        <input type="text" id="il_${seq}" value="${label}" placeholder="לדוגמה: שכירות, חשמל, מים">
      </div>
      <div id="amtWrap_${seq}" ${isElec ? 'style="display:none"' : ''}>
        <label>₪ כולל מע"מ</label>
        <input type="number" id="ia_${seq}" value="${amt}" placeholder="0.00" min="0" step="0.01"
          oninput="syncVat(${seq},'after')">
      </div>
      <div id="bvWrap_${seq}" ${isElec ? 'style="display:none"' : ''}>
        <label>₪ לפני מע"מ</label>
        <input type="number" id="ib_${seq}" value="${bv}" placeholder="0.00" min="0" step="0.01"
          oninput="syncVat(${seq},'before')">
      </div>
      <div id="elecWrap_${seq}" ${!isElec ? 'style="display:none"' : 'style="grid-column:2/span 2"'}>
        <label>₪ מחיר לקוטש (ברירת מחדל)</label>
        <input type="number" id="ikwh_${seq}" value="${pkwh}" placeholder="0.000" min="0" step="0.001">
      </div>
      <button onclick="document.getElementById('item_${seq}').remove()"
        style="width:32px;height:32px;border:none;background:var(--danger-light);color:var(--danger);border-radius:8px;cursor:pointer;font-size:16px;align-self:end;margin-bottom:0">✕</button>
    </div>
    <div class="item-row-bottom">
      <button id="ityp_${seq}" class="type-toggle ${type}" onclick="toggleItemType(${seq})"
        data-type="${type}" title="לחץ להחלפת סוג">${typeLabels[type]}</button>
      <span class="vat-hint" id="ivh_${seq}">${hintText}</span>
      <input type="text" id="in_${seq}" value="${notes}" placeholder="הערה (אופציונלי)"
        style="flex:1;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:12px">
    </div>
  `;
  wrap.appendChild(div);
}

// ===== VAT SYNC =====
function syncVat(seq, changed) {
  const afterEl  = document.getElementById('ia_' + seq);
  const beforeEl = document.getElementById('ib_' + seq);
  const hintEl   = document.getElementById('ivh_' + seq);
  if (changed === 'after') {
    const v = parseFloat(afterEl.value);
    if (!isNaN(v) && v > 0) {
      const bv = (v / VAT_RATE).toFixed(2);
      beforeEl.value = bv;
      hintEl.textContent = `לפני מע"מ: ₪${bv}`;
    } else {
      beforeEl.value = '';
      hintEl.textContent = 'מלא כולל מע"מ ← יחושב לפני אוטומטית';
    }
  } else {
    const v = parseFloat(beforeEl.value);
    if (!isNaN(v) && v > 0) {
      const av = (v * VAT_RATE).toFixed(2);
      afterEl.value = av;
      hintEl.textContent = `כולל מע"מ: ₪${av}`;
    } else {
      afterEl.value = '';
      hintEl.textContent = 'מלא כולל מע"מ ← יחושב לפני אוטומטית';
    }
  }
}

// ===== TOGGLE ITEM TYPE =====
function toggleItemType(seq) {
  const btn = document.getElementById('ityp_' + seq);
  const cur = btn.dataset.type;
  const order = ['fixed', 'variable', 'electricity'];
  const next  = order[(order.indexOf(cur) + 1) % order.length];
  btn.dataset.type = next;
  const labels = { fixed:'📌 קבוע', variable:'📊 משתנה', electricity:'⚡ חשמל' };
  btn.textContent = labels[next];
  btn.className   = 'type-toggle ' + next;

  const amtWrap  = document.getElementById('amtWrap_'  + seq);
  const bvWrap   = document.getElementById('bvWrap_'   + seq);
  const elecWrap = document.getElementById('elecWrap_' + seq);
  const hintEl   = document.getElementById('ivh_'      + seq);
  const labelEl  = document.getElementById('il_'       + seq);

  if (next === 'electricity') {
    amtWrap.style.display       = 'none';
    bvWrap.style.display        = 'none';
    elecWrap.style.display      = '';
    elecWrap.style.gridColumn   = '2 / span 2';
    hintEl.textContent          = '⚡ הסכום יחושב לפי קריאת מונה בכל חודש';
    if (!labelEl.value) labelEl.value = 'חשמל';
  } else {
    amtWrap.style.display       = '';
    bvWrap.style.display        = '';
    elecWrap.style.display      = 'none';
    elecWrap.style.gridColumn   = '';
    if (next === 'variable') {
      hintEl.textContent = '⚠️ הסכום יוזן ידנית בכל חודש';
    } else {
      const bv = document.getElementById('ib_' + seq).value;
      hintEl.textContent = bv ? `לפני מע"מ: ₪${bv}` : 'מלא כולל מע"מ ← יחושב לפני אוטומטית';
    }
  }
}

// ===== SAVE TENANT =====
function saveTenant() {
  const name = document.getElementById('t_name').value.trim();
  if (!name) { showToast('הכנס שם שוכר', 'error'); return; }

  const items = [];
  let itemError = false;
  document.getElementById('itemsWrap').querySelectorAll('.item-row').forEach(row => {
    if (itemError) return;
    const seq    = row.id.replace('item_','');
    const label  = document.getElementById('il_' + seq).value.trim();
    const amount = parseFloat(document.getElementById('ia_' + seq).value) || 0;
    const bv     = parseFloat(document.getElementById('ib_' + seq).value) || 0;
    const notes  = document.getElementById('in_' + seq).value.trim();
    const typeBtn= document.getElementById('ityp_' + seq);
    const type   = typeBtn ? typeBtn.dataset.type : 'fixed';
    const pkwhEl = document.getElementById('ikwh_' + seq);
    const pkwh   = pkwhEl ? (parseFloat(pkwhEl.value) || 0) : 0;

    if (!label) return;
    if (type === 'fixed' && amount <= 0) return;
    if (type === 'electricity' && pkwh <= 0) {
      itemError = true;
      showToast('הכנס מחיר לקוטש עבור פריט חשמל', 'error');
      return;
    }
    const itemData = { id: nowId(), label, amount, beforeVat: bv, type, notes };
    if (type === 'electricity') itemData.pricePerKwh = pkwh;
    items.push(itemData);
  });
  if (itemError) return;

  if (!items.length) {
    showToast('הוסף לפחות פריט חיוב אחד', 'error');
    return;
  }

  const db = getDB(DB_TENANTS);
  const tenant = {
    name, items,
    phone: document.getElementById('t_phone').value.trim(),
    notes: document.getElementById('t_notes').value.trim()
  };
  if (_editTenantId) {
    const idx = db.findIndex(x => x.id === _editTenantId);
    if (idx !== -1) { tenant.id = _editTenantId; db[idx] = tenant; }
  } else {
    tenant.id = nowId();
    db.push(tenant);
  }
  setDB(DB_TENANTS, db);
  closeModal();
  renderBills();
  showToast(_editTenantId ? 'שוכר עודכן ✓' : 'שוכר נוסף ✓', 'success');
  autoSync();
}

function deleteTenant(id) {
  const t = getDB(DB_TENANTS).find(x => x.id === id);
  showConfirm(`למחוק את ${t?t.name:'שוכר זה'}? כל היסטוריית התשלומים תימחק!`, () => {
    setDB(DB_TENANTS, getDB(DB_TENANTS).filter(x => x.id !== id));
    setDB(DB_PAYMENTS, getDB(DB_PAYMENTS).filter(p => p.tenantId !== id));
    renderBills();
    showToast('שוכר נמחק ✓');
    autoSync();
  });
}

// ===== PRINT =====
function printBills() {
  document.querySelectorAll('.print-doc-header').forEach(el => el.style.display = 'flex');
  window.print();
  document.querySelectorAll('.print-doc-header').forEach(el => el.style.display = 'none');
}

// ===== INIT =====
buildPeriodList();
renderBills();
</script>
